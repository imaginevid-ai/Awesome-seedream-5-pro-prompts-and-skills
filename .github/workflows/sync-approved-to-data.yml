name: Sync Approved to Data

on:
  issues:
    types: [labeled]
    # Note: 'labeled' event triggers on both open and closed issues
    # This allows the workflow to run when 'approved' label is added
    # even if the issue was closed after being reopened

permissions:
  issues: write
  contents: write

jobs:
  sync:
    # Only trigger when 'approved' label is added AND issue has 'prompt-submission' label
    # Works for both open and closed issues
    # Note: We check both conditions - the added label must be 'approved'
    # AND the issue must already have 'prompt-submission' label
    if: |
      github.event.label.name == 'approved' &&
      contains(join(github.event.issue.labels.*.name, ' '), 'prompt-submission')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Parse issue and update local data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: pnpm run sync

      - name: Generate README
        run: pnpm run generate

      - name: Commit local data and README
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/prompts.json README*.md
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: sync approved prompt [skip ci]"
          git push

      - name: Comment on issue
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Your prompt has been approved and synced into the repository data. It will appear in the generated README after the workflow finishes. Thank you for your contribution.'
            })
